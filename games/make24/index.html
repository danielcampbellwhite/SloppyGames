<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6775423540653672" crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-6775423540653672" />
  <title>Number Splash — Sloppy Games</title>
  <meta name="description" content="Use four numbers with + − × ÷ to hit the target. Mental maths puzzle." />
  <link rel="icon" type="image/png" href="../../assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --purple: #9333ea; --purple-dark: #6b21a8; --lime: #84cc16; --lime-dark: #65a30d; --pink: #ec4899; --cyan: #06b6d4; --yellow: #facc15; --ink: #1a1a1a; --paper: #ffffff; --bg: #fffdf6; --shadow: rgba(26, 26, 26, 0.2); }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: 'Fredoka', system-ui, sans-serif; color: var(--ink); background: var(--bg); min-height: 100dvh; display: flex; flex-direction: column; -webkit-tap-highlight-color: transparent; }
    h1, h2 { font-family: 'Baloo 2', sans-serif; font-weight: 800; margin: 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; max-width: 1100px; width: 100%; margin: 0 auto; }
    .back { display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--ink); font-family: 'Baloo 2', sans-serif; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 999px; border: 3px solid var(--ink); background: var(--paper); box-shadow: 4px 4px 0 var(--ink); }
    .back:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
    .topbar img { height: 48px; filter: drop-shadow(0 3px 0 var(--shadow)); }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0.5rem 1rem 2rem; gap: 0.75rem; }
    .title { text-align: center; font-size: clamp(1.75rem, 4.5vw, 2.5rem); line-height: 1.1; }
    .title .accent { background: var(--lime); padding: 0 0.4rem; border-radius: 10px; box-shadow: 3px 3px 0 var(--ink); display: inline-block; transform: rotate(-1deg); }
    .subtitle { text-align: center; max-width: 540px; color: #444; margin: -0.25rem 0 0.5rem; }
    .hud { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; width: min(560px, 95vw); }
    .hud-pill { flex: 1 1 0; min-width: 110px; background: var(--paper); border: 3px solid var(--ink); border-radius: 16px; box-shadow: 4px 4px 0 var(--ink); padding: 0.4rem 0.7rem; text-align: center; }
    .hud-pill .label { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.65rem; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
    .hud-pill .value { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(1.2rem, 3.5vw, 1.6rem); line-height: 1; color: var(--ink); }

    .panel { width: min(560px, 95vw); background: var(--paper); border: 3px solid var(--ink); border-radius: 20px; box-shadow: 0 6px 0 var(--ink); padding: 1rem; display: flex; flex-direction: column; gap: 0.85rem; align-items: center; }
    .target { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(1.4rem, 4.5vw, 2rem); }
    .target .num { color: var(--purple-dark); background: var(--lime); padding: 0 0.5rem; border-radius: 10px; box-shadow: 3px 3px 0 var(--ink); display: inline-block; }
    .formula { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(1.3rem, 4vw, 1.8rem); min-height: 2.2em; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; justify-content: center; min-width: 80%; padding: 0.5rem; background: #f9fafb; border: 3px dashed #d1d5db; border-radius: 14px; }
    .formula .eq { color: #666; }
    .formula .result { color: var(--purple-dark); }

    .pads { display: grid; gap: 0.5rem; width: min(560px, 95vw); grid-template-columns: 1fr 1fr 1fr 1fr; }
    .pad {
      font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(1.3rem, 4vw, 1.8rem);
      padding: 0.95rem 0; border-radius: 14px; border: 3px solid var(--ink); background: var(--paper); color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink); cursor: pointer;
    }
    .pad:hover { background: #f3f3f3; }
    .pad:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }
    .pad.used { opacity: 0.3; cursor: default; box-shadow: 1px 1px 0 var(--ink); }
    .ops { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; width: min(560px, 95vw); }
    .op { background: var(--cyan); }
    .op.eq { background: var(--yellow); }

    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .btn { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.05rem; padding: 0.65rem 1.3rem; border-radius: 999px; border: 3px solid var(--ink); background: var(--lime); color: var(--ink); box-shadow: 4px 4px 0 var(--ink); cursor: pointer; }
    .btn:hover { background: #a3e635; }
    .btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }
    .btn.ghost { background: var(--paper); }
    .status { font-family: 'Baloo 2', sans-serif; font-weight: 700; min-height: 1.4em; text-align: center; }
    .status.win { color: var(--lime-dark); }
    .status.bad { color: var(--pink); }
    .hint { font-size: 0.9rem; color: #666; text-align: center; }
    @media (max-width: 540px) { .topbar { padding: 0.75rem 1rem; } .topbar img { height: 38px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="../../index.html">← Back</a>
    <a href="../../index.html"><img src="../../assets/logo.png" alt="Sloppy Games" /></a>
  </header>

  <main>
    <h1 class="title">Number Splash <span class="accent">Hit the target</span></h1>
    <p class="subtitle">Tap four numbers and three operators in order to make the target. Use each number exactly once.</p>

    <div class="hud">
      <div class="hud-pill"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="hud-pill"><div class="label">Puzzles</div><div class="value" id="puzzles">0</div></div>
      <div class="hud-pill"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
      <div class="hud-pill"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="panel">
      <div class="target">Target: <span class="num" id="target">24</span></div>
      <div class="formula" id="formula"><span style="color:#aaa">Tap a number to start</span></div>
      <div class="actions">
        <button class="btn ghost" id="undoBtn">↶ Undo</button>
        <button class="btn ghost" id="clearBtn">Clear</button>
        <button class="btn" id="checkBtn">Check =</button>
      </div>
      <div id="status" class="status">&nbsp;</div>
    </div>

    <div class="pads" id="pads"></div>
    <div class="ops">
      <button class="pad op" data-op="+">+</button>
      <button class="pad op" data-op="−">−</button>
      <button class="pad op" data-op="×">×</button>
      <button class="pad op" data-op="÷">÷</button>
    </div>

    <div class="actions">
      <button class="btn" id="newBtn">New puzzle</button>
    </div>

    <p class="hint">Numbers are evaluated left-to-right (no operator precedence) to keep mental maths simple.</p>
  </main>

  <script>
    let audio = null;
    function ensureAudio() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); if (audio.state === 'suspended') audio.resume(); return audio; }
    function env(g, t, a, h, r, peak = 0.22) { g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(peak, t + a); g.gain.setValueAtTime(peak, t + a + h); g.gain.linearRampToValueAtTime(0, t + a + h + r); }
    function playTap() { const c = ensureAudio(), t = c.currentTime; const g = c.createGain(); g.connect(c.destination); env(g, t, 0.002, 0.01, 0.04, 0.16); const o = c.createOscillator(); o.type='triangle'; o.frequency.value=900; o.connect(g); o.start(t); o.stop(t+0.06); }
    function playWin() { const c = ensureAudio(), t = c.currentTime; [523.25, 659.25, 783.99, 1046.5].forEach((f,i) => { const g = c.createGain(); g.connect(c.destination); env(g, t+i*0.08, 0.005, 0.05, 0.15, 0.22); const o = c.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(g); o.start(t+i*0.08); o.stop(t+i*0.08+0.22); }); }
    function playBad() { const c = ensureAudio(), t = c.currentTime; const g = c.createGain(); g.connect(c.destination); env(g, t, 0.005, 0.04, 0.18, 0.28); const o = c.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(240, t); o.frequency.exponentialRampToValueAtTime(110, t+0.22); o.connect(g); o.start(t); o.stop(t+0.24); }

    const $ = id => document.getElementById(id);
    const BEST_KEY = 'sloppy.make24.best';
    let nums = [], used = [false,false,false,false], expr = [], target = 24, score = 0, streak = 0, puzzles = 0, attempts = 0;
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    $('best').textContent = best;

    function evaluate(seq) {
      // left-to-right: num op num op num op num
      if (seq.length < 1) return null;
      // sequence is [num, op, num, op, num, ...]
      if (typeof seq[0] !== 'number') return null;
      let v = seq[0];
      for (let i = 1; i < seq.length; i += 2) {
        const op = seq[i], n = seq[i+1];
        if (typeof n !== 'number') return null;
        if (op === '+') v = v + n;
        else if (op === '−') v = v - n;
        else if (op === '×') v = v * n;
        else if (op === '÷') { if (n === 0) return null; v = v / n; }
      }
      return v;
    }

    function generatePuzzle() {
      // try until we find a combination of 4 numbers that yields a target
      for (let tries = 0; tries < 200; tries++) {
        const a = 1 + Math.floor(Math.random() * 9);
        const b = 1 + Math.floor(Math.random() * 9);
        const c = 1 + Math.floor(Math.random() * 9);
        const d = 1 + Math.floor(Math.random() * 9);
        const ns = [a, b, c, d];
        const sol = findSolution(ns);
        if (sol) {
          return { nums: ns, target: sol.target };
        }
      }
      return { nums: [1, 2, 3, 6], target: 12 };
    }

    function findSolution(ns) {
      // try all permutations and operator triples; return one that yields an integer target between 5 and 60
      const ops = ['+','−','×','÷'];
      const perms = permutations(ns);
      const tried = new Set();
      for (const p of perms) {
        for (const o1 of ops) for (const o2 of ops) for (const o3 of ops) {
          const seq = [p[0], o1, p[1], o2, p[2], o3, p[3]];
          const v = evaluate(seq);
          if (v === null) continue;
          if (!Number.isFinite(v)) continue;
          if (Math.abs(v - Math.round(v)) > 1e-9) continue;
          const t = Math.round(v);
          if (t >= 5 && t <= 60 && !tried.has(t)) {
            tried.add(t);
            return { target: t };
          }
        }
      }
      return null;
    }

    function permutations(arr) {
      const out = [];
      const helper = (a, picked) => {
        if (a.length === 0) { out.push(picked); return; }
        for (let i = 0; i < a.length; i++) {
          const next = a.slice(0, i).concat(a.slice(i + 1));
          helper(next, picked.concat([a[i]]));
        }
      };
      helper(arr, []);
      return out;
    }

    function newPuzzle() {
      const p = generatePuzzle();
      nums = p.nums.slice();
      target = p.target;
      used = [false,false,false,false];
      expr = [];
      attempts = 0;
      $('target').textContent = target;
      renderPads();
      renderFormula();
      $('status').textContent = '';
      $('status').className = 'status';
      $('puzzles').textContent = puzzles;
      $('streak').textContent = streak;
    }

    function renderPads() {
      const padsEl = $('pads');
      padsEl.innerHTML = '';
      nums.forEach((n, i) => {
        const b = document.createElement('button');
        b.className = 'pad' + (used[i] ? ' used' : '');
        b.textContent = n;
        b.disabled = used[i];
        b.addEventListener('click', () => useNum(i));
        padsEl.appendChild(b);
      });
    }

    function renderFormula() {
      const el = $('formula');
      if (!expr.length) { el.innerHTML = '<span style="color:#aaa">Tap a number to start</span>'; return; }
      const parts = expr.map(p => `<span>${p}</span>`).join('<span class="eq">·</span>');
      const v = evaluate(expr);
      const tail = (expr.length >= 7 || typeof expr[expr.length - 1] === 'number')
        ? `<span class="eq">=</span> <span class="result">${v !== null ? (Number.isInteger(v) ? v : v.toFixed(2)) : '?'}</span>`
        : '';
      el.innerHTML = parts + tail;
    }

    function useNum(i) {
      if (used[i]) return;
      const last = expr[expr.length - 1];
      // Need either an empty expr or last is an operator
      if (expr.length > 0 && typeof last === 'number') return;
      used[i] = true;
      expr.push(nums[i]);
      ensureAudio(); playTap();
      renderPads(); renderFormula();
    }

    document.querySelectorAll('.op').forEach(b => {
      b.addEventListener('click', () => {
        const op = b.dataset.op;
        const last = expr[expr.length - 1];
        if (typeof last !== 'number') return; // need a number first
        if (expr.length >= 7) return; // 4 nums + 3 ops max
        expr.push(op);
        ensureAudio(); playTap();
        renderFormula();
      });
    });

    $('undoBtn').addEventListener('click', () => {
      if (!expr.length) return;
      const removed = expr.pop();
      if (typeof removed === 'number') {
        const idx = nums.indexOf(removed);
        // unmark the matching used slot (find first used with same value)
        for (let i = 0; i < nums.length; i++) {
          if (nums[i] === removed && used[i]) {
            // need a more robust mapping; but with duplicate values, pop in reverse order
            // find the last used index of this value
          }
        }
        // Robust: find last used slot whose value matches
        for (let i = nums.length - 1; i >= 0; i--) {
          if (nums[i] === removed && used[i]) { used[i] = false; break; }
        }
      }
      ensureAudio(); playTap();
      renderPads(); renderFormula();
    });
    $('clearBtn').addEventListener('click', () => {
      expr = [];
      used = [false,false,false,false];
      ensureAudio(); playTap();
      renderPads(); renderFormula();
      $('status').textContent = '';
      $('status').className = 'status';
    });

    $('checkBtn').addEventListener('click', () => {
      ensureAudio();
      attempts += 1;
      // Must use all 4 numbers
      const allUsed = used.every(u => u);
      if (!allUsed) {
        $('status').textContent = 'Use all four numbers!';
        $('status').className = 'status bad';
        playBad();
        return;
      }
      const v = evaluate(expr);
      if (v === null || !Number.isFinite(v)) {
        $('status').textContent = 'That expression doesn’t compute.';
        $('status').className = 'status bad';
        playBad();
        return;
      }
      if (Math.abs(v - target) < 1e-9) {
        const bonus = Math.max(0, 8 - (attempts - 1) * 3);
        const earned = 10 + bonus;
        score += earned;
        streak += 1;
        puzzles += 1;
        if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); }
        $('score').textContent = score;
        $('best').textContent = best;
        $('status').textContent = `Yes! +${earned} points.`;
        $('status').className = 'status win';
        playWin();
        setTimeout(newPuzzle, 1100);
      } else {
        streak = 0;
        $('streak').textContent = streak;
        $('status').textContent = `That makes ${Number.isInteger(v) ? v : v.toFixed(2)} — not ${target}. Try again!`;
        $('status').className = 'status bad';
        playBad();
      }
    });
    $('newBtn').addEventListener('click', () => { ensureAudio(); newPuzzle(); });

    newPuzzle();
  </script>
</body>
</html>
