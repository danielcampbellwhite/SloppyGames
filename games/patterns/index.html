<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6775423540653672" crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-6775423540653672" />
  <title>Splat Patterns — Sloppy Games</title>
  <meta name="description" content="Spot the pattern and pick what comes next. Colours, shapes, numbers." />
  <link rel="icon" type="image/png" href="../../assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --purple: #9333ea; --purple-dark: #6b21a8; --lime: #84cc16; --lime-dark: #65a30d; --pink: #ec4899; --cyan: #06b6d4; --yellow: #facc15; --orange: #f97316; --red: #ef4444; --blue: #3b82f6; --ink: #1a1a1a; --paper: #ffffff; --bg: #fffdf6; --shadow: rgba(26, 26, 26, 0.2); }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: 'Fredoka', system-ui, sans-serif; color: var(--ink); background: var(--bg); min-height: 100dvh; display: flex; flex-direction: column; -webkit-tap-highlight-color: transparent; }
    h1, h2 { font-family: 'Baloo 2', sans-serif; font-weight: 800; margin: 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; max-width: 1100px; width: 100%; margin: 0 auto; }
    .back { display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--ink); font-family: 'Baloo 2', sans-serif; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 999px; border: 3px solid var(--ink); background: var(--paper); box-shadow: 4px 4px 0 var(--ink); }
    .back:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
    .topbar img { height: 48px; filter: drop-shadow(0 3px 0 var(--shadow)); }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0.5rem 1rem 2rem; gap: 0.75rem; }
    .title { text-align: center; font-size: clamp(1.75rem, 4.5vw, 2.5rem); line-height: 1.1; }
    .title .accent { background: var(--lime); padding: 0 0.4rem; border-radius: 10px; box-shadow: 3px 3px 0 var(--ink); display: inline-block; transform: rotate(-1deg); }
    .subtitle { text-align: center; max-width: 540px; color: #444; margin: -0.25rem 0 0.5rem; }
    .hud { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; width: min(560px, 95vw); }
    .hud-pill { flex: 1 1 0; min-width: 110px; background: var(--paper); border: 3px solid var(--ink); border-radius: 16px; box-shadow: 4px 4px 0 var(--ink); padding: 0.4rem 0.7rem; text-align: center; }
    .hud-pill .label { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.65rem; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
    .hud-pill .value { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(1.2rem, 3.5vw, 1.6rem); line-height: 1; color: var(--ink); }

    .panel { width: min(700px, 95vw); background: var(--paper); border: 3px solid var(--ink); border-radius: 20px; box-shadow: 0 6px 0 var(--ink); padding: 1rem 1.25rem; }
    .ptype { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
    .pattern { display: flex; align-items: center; justify-content: center; gap: 0.7rem; padding: 0.75rem 0; flex-wrap: wrap; min-height: 90px; }
    .cell { width: 60px; height: 60px; display: inline-flex; align-items: center; justify-content: center; border: 3px solid var(--ink); border-radius: 14px; background: var(--paper); box-shadow: 3px 3px 0 var(--ink); font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.6rem; }
    .cell.q { background: #f9fafb; border: 3px dashed #d1d5db; box-shadow: none; font-size: 2rem; color: var(--pink); }
    .cell.colour { box-shadow: 3px 3px 0 var(--ink); }
    .cell svg { width: 80%; height: 80%; }
    @media (max-width: 540px) { .cell { width: 48px; height: 48px; font-size: 1.3rem; } }

    .choices { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
    @media (max-width: 540px) { .choices { grid-template-columns: 1fr 1fr; } }
    .choice { aspect-ratio: 1.2; display: inline-flex; align-items: center; justify-content: center; border: 3px solid var(--ink); border-radius: 14px; background: var(--paper); box-shadow: 4px 4px 0 var(--ink); cursor: pointer; font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.6rem; }
    .choice:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }
    .choice.good { background: var(--lime); animation: pop 0.4s ease; }
    .choice.bad { background: var(--pink); color: var(--paper); animation: shake 0.3s ease; }
    @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
    .choice svg { width: 70%; height: 70%; }

    .status { font-family: 'Baloo 2', sans-serif; font-weight: 700; min-height: 1.4em; text-align: center; }
    .status.win { color: var(--lime-dark); }
    .status.bad { color: var(--pink); }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .btn { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.05rem; padding: 0.65rem 1.3rem; border-radius: 999px; border: 3px solid var(--ink); background: var(--lime); color: var(--ink); box-shadow: 4px 4px 0 var(--ink); cursor: pointer; }
    .btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }
    .hint { font-size: 0.9rem; color: #666; text-align: center; }
    @media (max-width: 540px) { .topbar { padding: 0.75rem 1rem; } .topbar img { height: 38px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="../../index.html">← Back</a>
    <a href="../../index.html"><img src="../../assets/logo.png" alt="Sloppy Games" /></a>
  </header>

  <main>
    <h1 class="title">Splat Patterns <span class="accent">What's next?</span></h1>
    <p class="subtitle">Look at the sequence. Spot the pattern. Pick what comes next.</p>

    <div class="hud">
      <div class="hud-pill"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="hud-pill"><div class="label">Round</div><div class="value" id="round">1</div></div>
      <div class="hud-pill"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
      <div class="hud-pill"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="panel">
      <div class="ptype" id="ptype">— —</div>
      <div class="pattern" id="pattern"></div>
      <div class="choices" id="choices"></div>
      <div class="status" id="status">Tap your answer.</div>
    </div>

    <p class="hint">Patterns can be colours, shapes, sizes or numbers. They might cycle, grow, or repeat.</p>
  </main>

  <script>
    let audio = null;
    function ensureAudio() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); if (audio.state === 'suspended') audio.resume(); return audio; }
    function env(g, t, a, h, r, peak = 0.22) { g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(peak, t + a); g.gain.setValueAtTime(peak, t + a + h); g.gain.linearRampToValueAtTime(0, t + a + h + r); }
    function playGood() { const c = ensureAudio(), t = c.currentTime; [659.25, 880].forEach((f,i) => { const g = c.createGain(); g.connect(c.destination); env(g, t+i*0.05, 0.005, 0.04, 0.12, 0.22); const o = c.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(g); o.start(t+i*0.05); o.stop(t+i*0.05+0.18); }); }
    function playBad() { const c = ensureAudio(), t = c.currentTime; const g = c.createGain(); g.connect(c.destination); env(g, t, 0.005, 0.04, 0.18, 0.28); const o = c.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(240, t); o.frequency.exponentialRampToValueAtTime(110, t+0.22); o.connect(g); o.start(t); o.stop(t+0.24); }

    const $ = id => document.getElementById(id);
    const BEST_KEY = 'sloppy.patterns.best';

    const COLOURS = [
      { name: 'purple', hex: '#9333ea' },
      { name: 'lime',   hex: '#84cc16' },
      { name: 'pink',   hex: '#ec4899' },
      { name: 'cyan',   hex: '#06b6d4' },
      { name: 'yellow', hex: '#facc15' },
      { name: 'orange', hex: '#f97316' },
      { name: 'blue',   hex: '#3b82f6' },
      { name: 'red',    hex: '#ef4444' },
    ];
    const SHAPES = ['circle','square','triangle','star','heart','diamond'];

    // ---------- State ----------
    let round = 1, score = 0, streak = 0, current = null;
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    $('best').textContent = best;

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { const a = arr.slice(); for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

    function makePuzzle() {
      const typeChoices = round < 3 ? ['repeat'] :
                          round < 6 ? ['repeat','grow'] :
                          ['repeat','grow','number','shape-grow','two-step'];
      const type = pick(typeChoices);

      if (type === 'repeat') {
        // ABAB or ABCABC repeat
        const period = pick([2, 3]);
        const palette = shuffle(COLOURS).slice(0, period);
        const seq = [];
        for (let i = 0; i < 5; i++) seq.push(palette[i % period]);
        const answer = palette[5 % period];
        const distractors = shuffle(COLOURS.filter(c => !palette.some(p => p.name === c.name))).slice(0, 3);
        const choices = shuffle([answer, ...distractors]);
        return { kind: 'colour', label: 'Repeating colours', seq: seq.map(c => ({ type:'colour', val: c })), answer: { type: 'colour', val: answer }, choices: choices.map(c => ({ type:'colour', val: c })) };
      }
      if (type === 'grow') {
        // numbers +k
        const k = pick([1, 2, 3, 5, 10]);
        const start = 1 + Math.floor(Math.random() * 10);
        const seq = [];
        for (let i = 0; i < 5; i++) seq.push(start + i * k);
        const answer = start + 5 * k;
        const distractors = [answer + 1, answer - 1, answer + k, answer - k].filter(n => n !== answer);
        const choices = shuffle([answer, ...shuffle(distractors).slice(0, 3)]);
        return { kind: 'number', label: `Numbers — each +${k}`, seq: seq.map(n => ({ type:'number', val: n })), answer: { type: 'number', val: answer }, choices: choices.map(n => ({ type:'number', val: n })) };
      }
      if (type === 'number') {
        // multiplication by 2
        const k = pick([2, 3]);
        const start = 1 + Math.floor(Math.random() * 4);
        const seq = [];
        let cur = start;
        for (let i = 0; i < 5; i++) { seq.push(cur); cur *= k; }
        const answer = cur;
        const distractors = [answer + 1, answer - 1, answer * 2, Math.floor(answer / 2)].filter(n => n !== answer && n > 0);
        const choices = shuffle([answer, ...shuffle(distractors).slice(0, 3)]);
        return { kind: 'number', label: `Numbers — each ×${k}`, seq: seq.map(n => ({ type:'number', val: n })), answer: { type: 'number', val: answer }, choices: choices.map(n => ({ type:'number', val: n })) };
      }
      if (type === 'shape-grow') {
        // shape repeats but colour cycles
        const shape = pick(SHAPES);
        const palette = shuffle(COLOURS).slice(0, 3);
        const seq = [];
        for (let i = 0; i < 5; i++) seq.push({ shape, colour: palette[i % 3] });
        const answer = { shape, colour: palette[5 % 3] };
        const distractors = palette.filter(c => c.name !== answer.colour.name).map(c => ({ shape, colour: c }));
        const distractors2 = shuffle(COLOURS.filter(c => !palette.some(p => p.name === c.name))).slice(0, 2).map(c => ({ shape, colour: c }));
        const choices = shuffle([answer, ...shuffle([...distractors, ...distractors2]).slice(0, 3)]);
        return { kind: 'shape', label: 'Same shape, cycling colour', seq: seq.map(s => ({ type:'shape', val: s })), answer: { type: 'shape', val: answer }, choices: choices.map(s => ({ type:'shape', val: s })) };
      }
      // two-step: alternating
      {
        const a = pick(COLOURS), b = pick(COLOURS.filter(c => c.name !== a.name));
        const seq = [];
        for (let i = 0; i < 5; i++) seq.push(i % 2 === 0 ? a : b);
        const answer = (5 % 2 === 0) ? a : b;
        const distractors = shuffle(COLOURS.filter(c => c.name !== a.name && c.name !== b.name)).slice(0, 3);
        const choices = shuffle([answer, ...distractors]);
        return { kind: 'colour', label: 'Alternating', seq: seq.map(c => ({ type:'colour', val: c })), answer: { type: 'colour', val: answer }, choices: choices.map(c => ({ type:'colour', val: c })) };
      }
    }

    function renderItem(item, classes = '') {
      if (item.type === 'colour') {
        const div = document.createElement('div');
        div.className = 'cell colour ' + classes;
        div.style.background = item.val.hex;
        return div;
      }
      if (item.type === 'number') {
        const div = document.createElement('div');
        div.className = 'cell ' + classes;
        div.textContent = item.val;
        return div;
      }
      if (item.type === 'shape') {
        const div = document.createElement('div');
        div.className = 'cell ' + classes;
        div.innerHTML = shapeSVG(item.val.shape, item.val.colour.hex);
        return div;
      }
    }

    function shapeSVG(shape, fill) {
      const stroke = '#1a1a1a';
      const sw = 4;
      if (shape === 'circle') return `<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
      if (shape === 'square') return `<svg viewBox="0 0 60 60"><rect x="10" y="10" width="40" height="40" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
      if (shape === 'triangle') return `<svg viewBox="0 0 60 60"><path d="M 30 8 L 54 50 L 6 50 Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/></svg>`;
      if (shape === 'star') return `<svg viewBox="0 0 60 60"><path d="M 30 6 L 36 24 L 56 24 L 40 36 L 46 54 L 30 42 L 14 54 L 20 36 L 4 24 L 24 24 Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/></svg>`;
      if (shape === 'heart') return `<svg viewBox="0 0 60 60"><path d="M 30 50 C 8 36, 4 20, 14 12 C 22 6, 30 14, 30 22 C 30 14, 38 6, 46 12 C 56 20, 52 36, 30 50 Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/></svg>`;
      if (shape === 'diamond') return `<svg viewBox="0 0 60 60"><path d="M 30 8 L 52 30 L 30 52 L 8 30 Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/></svg>`;
      return '';
    }

    function renderPuzzle() {
      const seqEl = $('pattern'), choicesEl = $('choices');
      seqEl.innerHTML = '';
      choicesEl.innerHTML = '';
      current.seq.forEach(item => seqEl.appendChild(renderItem(item)));
      // question mark cell
      const q = document.createElement('div');
      q.className = 'cell q';
      q.textContent = '?';
      seqEl.appendChild(q);
      // choices
      current.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        if (c.type === 'colour') {
          btn.style.background = c.val.hex;
        } else if (c.type === 'number') {
          btn.textContent = c.val;
        } else if (c.type === 'shape') {
          btn.innerHTML = shapeSVG(c.val.shape, c.val.colour.hex);
        }
        btn.addEventListener('click', () => guess(c, btn));
        choicesEl.appendChild(btn);
      });
      $('ptype').textContent = current.label;
      $('round').textContent = round;
      $('streak').textContent = streak;
      $('score').textContent = score;
      $('status').textContent = 'Tap your answer.';
      $('status').className = 'status';
    }

    function guess(c, btn) {
      ensureAudio();
      const isRight = isEqual(c, current.answer);
      if (isRight) {
        btn.classList.add('good');
        playGood();
        streak += 1;
        score += 10 + Math.min(20, streak * 2);
        if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); }
        $('status').textContent = 'Nailed it!';
        $('status').className = 'status win';
        // disable other choices
        document.querySelectorAll('.choice').forEach(b => b.disabled = true);
        setTimeout(() => {
          round += 1;
          current = makePuzzle();
          renderPuzzle();
        }, 900);
      } else {
        btn.classList.add('bad');
        playBad();
        streak = 0;
        $('status').textContent = 'Not quite! Try another.';
        $('status').className = 'status bad';
        btn.disabled = true;
      }
    }

    function isEqual(a, b) {
      if (a.type !== b.type) return false;
      if (a.type === 'colour') return a.val.name === b.val.name;
      if (a.type === 'number') return a.val === b.val;
      if (a.type === 'shape') return a.val.shape === b.val.shape && a.val.colour.name === b.val.colour.name;
      return false;
    }

    current = makePuzzle();
    renderPuzzle();
  </script>
</body>
</html>
