<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Maths Sprint — Sloppy Games</title>
  <meta name="description" content="Race a Splat Bot by answering quick maths questions. Every correct answer makes you sprint faster!" />
  <link rel="icon" type="image/png" href="../../assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple: #9333ea;
      --purple-dark: #6b21a8;
      --purple-light: #c084fc;
      --lime: #84cc16;
      --lime-dark: #65a30d;
      --lime-light: #bef264;
      --pink: #ec4899;
      --ink: #1a1a1a;
      --paper: #ffffff;
      --bg: #fff;
      --sky-top: #93c5fd;
      --sky-mid: #bfdbfe;
      --sky-bottom: #dbeafe;
      --shadow: rgba(26, 26, 26, 0.2);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Fredoka', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }
    h1, h2 { font-family: 'Baloo 2', sans-serif; font-weight: 800; margin: 0; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      text-decoration: none; color: var(--ink);
      font-family: 'Baloo 2', sans-serif; font-weight: 700;
      padding: 0.5rem 0.9rem; border-radius: 999px;
      border: 3px solid var(--ink); background: var(--paper);
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .back:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
    .back:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }
    .topbar img { height: 48px; filter: drop-shadow(0 3px 0 var(--shadow)); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 1rem 2rem;
      gap: 0.75rem;
    }
    .title {
      text-align: center;
      font-size: clamp(1.75rem, 4.5vw, 2.5rem);
      line-height: 1.1;
    }
    .title .accent {
      background: var(--lime);
      padding: 0 0.4rem;
      border-radius: 10px;
      box-shadow: 3px 3px 0 var(--ink);
      display: inline-block;
      transform: rotate(-1deg);
    }
    .subtitle {
      text-align: center;
      max-width: 540px;
      color: #444;
      margin: -0.25rem 0 0.5rem;
    }

    /* Race strip */
    .stage {
      position: relative;
      width: min(700px, 95vw);
      aspect-ratio: 2.6;
      border: 4px solid var(--ink);
      border-radius: 24px;
      box-shadow: 0 8px 0 var(--ink);
      overflow: hidden;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 60%, var(--sky-bottom) 100%);
    }
    canvas#race {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD overlay on race strip */
    .progress-row {
      position: absolute;
      top: 8px;
      left: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 3;
    }
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .progress-bar .label {
      width: 56px;
      text-align: right;
      color: var(--ink);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
    }
    .progress-bar .track {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.7);
      border: 2px solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      width: 0%;
      transition: width 0.15s linear;
    }
    .progress-bar.player .fill { background: var(--purple); }
    .progress-bar.cpu .fill    { background: var(--lime-dark); }

    /* Question card */
    .qcard {
      width: min(700px, 95vw);
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: 24px;
      box-shadow: 0 8px 0 var(--ink);
      padding: 1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .qline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .qtext {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 4.5vw, 2.4rem);
      line-height: 1;
      color: var(--ink);
    }
    .qstreak {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--lime-dark);
    }
    .qstreak .badge {
      background: var(--lime);
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
      box-shadow: 2px 2px 0 var(--ink);
    }
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .answer {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      padding: 0.75rem;
      border-radius: 16px;
      border: 3px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
    }
    .answer:hover:not(:disabled) { background: #f3f3f3; }
    .answer:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--ink); }
    .answer.good { background: var(--lime); animation: goodFlash 0.4s ease; }
    .answer.bad  { background: var(--pink); color: var(--paper); animation: badShake 0.3s ease; }
    .answer:disabled { cursor: default; }
    @keyframes goodFlash {
      0% { transform: scale(1); }
      40% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes badShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Curtain (start / game over) */
    .curtain {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      text-align: center;
      padding: 1rem;
      transition: opacity 0.2s ease;
      z-index: 10;
    }
    .curtain.hidden { opacity: 0; pointer-events: none; }
    .curtain > div {
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 20px;
      box-shadow: 6px 6px 0 var(--ink);
      padding: 1rem 1.25rem;
      max-width: 90%;
    }
    .curtain h2 { font-size: clamp(1.3rem, 4vw, 1.8rem); margin-bottom: 0.4rem; }
    .curtain p { margin: 0.25rem 0 0.75rem; color: #333; font-size: 0.95rem; }
    .diff-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0.4rem 0 0.7rem;
    }
    .diff-row button {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      border: 3px solid var(--ink);
      background: var(--paper);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .diff-row button.active {
      background: var(--lime);
    }
    .diff-row button:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--ink); }

    .btn {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      border: 3px solid var(--ink);
      background: var(--lime);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    }
    .btn:hover { background: #a3e635; }
    .btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--ink); }

    .countdown {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: clamp(4rem, 14vw, 7rem);
      line-height: 1;
      color: var(--purple);
      text-shadow: 4px 4px 0 var(--ink);
      animation: count 0.9s ease-out;
    }
    @keyframes count {
      0% { transform: scale(0.4); opacity: 0; }
      30% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .hint { font-size: 0.9rem; color: #666; text-align: center; max-width: 540px; margin: 0 1rem; }
    kbd {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      background: var(--paper);
      border: 2px solid var(--ink);
      border-radius: 6px;
      padding: 0 0.4rem;
      box-shadow: 2px 2px 0 var(--ink);
    }

    /* Floating pop text (over stage) */
    .pop {
      position: absolute;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      pointer-events: none;
      animation: popUp 0.8s ease-out forwards;
      z-index: 5;
      text-shadow: 2px 2px 0 #fff;
    }
    .pop.good { color: var(--lime-dark); }
    .pop.bad  { color: var(--pink); }
    @keyframes popUp {
      0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
      20%  { transform: translate(-50%, -10px) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
    }

    @media (max-width: 540px) {
      .topbar { padding: 0.75rem 1rem; }
      .topbar img { height: 38px; }
      .qcard { padding: 0.85rem 1rem 1rem; }
      .stage {
        /* Much taller on phones so the start panel and runners fit */
        aspect-ratio: 1.25;
      }
      .subtitle { font-size: 0.95rem; margin-bottom: 0.25rem; }
      main { gap: 0.5rem; padding: 0.5rem 0.75rem 1.25rem; }
      .progress-bar .label { width: 36px; font-size: 0.7rem; }
      /* Compact start/game-over panel */
      .curtain > div { padding: 0.85rem 1rem; }
      .curtain h2 { font-size: 1.2rem; margin-bottom: 0.25rem; }
      .curtain p { font-size: 0.85rem; margin: 0.15rem 0 0.5rem; }
      .diff-row { margin: 0.2rem 0 0.5rem; gap: 0.3rem; }
      .diff-row button { font-size: 0.78rem; padding: 0.3rem 0.55rem; }
      .btn { font-size: 0.95rem; padding: 0.55rem 1.1rem; }
    }
    @media (max-width: 380px) {
      .stage { aspect-ratio: 1.05; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="../../index.html" aria-label="Back to Sloppy Games">← Back</a>
    <a href="../../index.html" aria-label="Sloppy Games home">
      <img src="../../assets/logo.png" alt="Sloppy Games" />
    </a>
  </header>

  <main>
    <h1 class="title">Maths Sprint <span class="accent">Answer fast, run faster</span></h1>
    <p class="subtitle">Race the Splat Bot to the finish line. Each correct answer boosts you forward — but a wrong one trips you up!</p>

    <div class="stage" id="stage">
      <canvas id="race"></canvas>
      <div class="progress-row" id="progressRow">
        <div class="progress-bar player"><span class="label">You</span><div class="track"><div class="fill" id="pFill"></div></div></div>
        <div class="progress-bar cpu"><span class="label">Bot</span><div class="track"><div class="fill" id="cFill"></div></div></div>
      </div>
      <div class="curtain" id="curtain">
        <div id="curtainInner">
          <h2 id="curtainTitle">Ready to race?</h2>
          <p id="curtainSub">Pick a difficulty, then tap Start.</p>
          <div class="diff-row" id="diffRow">
            <button data-diff="easy">Easy (+ −)</button>
            <button data-diff="normal" class="active">Normal (× ÷)</button>
            <button data-diff="hard">Hard (mix)</button>
          </div>
          <button class="btn" id="startBtn">Start</button>
        </div>
      </div>
    </div>

    <div class="qcard" id="qcard" aria-live="polite">
      <div class="qline">
        <div class="qtext" id="qtext">— —</div>
        <div class="qstreak">Streak: <span class="badge" id="streak">0</span></div>
      </div>
      <div class="answers" id="answers"></div>
    </div>

    <p class="hint">Use the buttons or press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> for the four answers.</p>
  </main>

  <script>
    // ---------- Audio ----------
    let audio = null;
    function ensureAudio() {
      if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
      if (audio.state === 'suspended') audio.resume();
      return audio;
    }
    function envelope(g, t, a, h, r, peak = 0.25) {
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(peak, t + a);
      g.gain.setValueAtTime(peak, t + a + h);
      g.gain.linearRampToValueAtTime(0, t + a + h + r);
    }
    function playGood() {
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      [659.25, 880].forEach((f, i) => {
        const g = ctx.createGain();
        g.connect(ctx.destination);
        envelope(g, t + i * 0.06, 0.005, 0.03, 0.1, 0.2);
        const o = ctx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = f;
        o.connect(g); o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.16);
      });
    }
    function playBad() {
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.connect(ctx.destination);
      envelope(g, t, 0.005, 0.04, 0.18, 0.28);
      const o = ctx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(110, t + 0.22);
      o.connect(g); o.start(t); o.stop(t + 0.24);
    }
    function playCountdown(n) {
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.connect(ctx.destination);
      envelope(g, t, 0.005, 0.08, 0.12, 0.28);
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = n === 0 ? 1000 : 600;
      o.connect(g); o.start(t); o.stop(t + 0.22);
    }
    function playWin() {
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) => {
        const g = ctx.createGain();
        g.connect(ctx.destination);
        envelope(g, t + i * 0.1, 0.008, 0.06, 0.2, 0.28);
        const o = ctx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = f;
        o.connect(g); o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.28);
      });
    }
    function playLose() {
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      [600, 480, 380, 260].forEach((f, i) => {
        const g = ctx.createGain();
        g.connect(ctx.destination);
        envelope(g, t + i * 0.12, 0.01, 0.05, 0.15, 0.22);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.value = f;
        o.connect(g); o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.22);
      });
    }

    // ---------- Config ----------
    const TRACK_LENGTH = 100;     // % of race
    const CORRECT_BOOST = 4.5;    // % added per correct
    const WRONG_PENALTY = 1.5;    // % subtracted per wrong (can't go below 0)
    const CPU_RATES = {           // % per second
      easy:   0.7,
      normal: 1.1,
      hard:   1.6,
    };
    const BEST_KEY = 'sloppy.maths.best';

    // ---------- Question generation ----------
    function pickN(arr, n) {
      const c = arr.slice();
      const out = [];
      while (out.length < n && c.length) {
        const i = Math.floor(Math.random() * c.length);
        out.push(c.splice(i, 1)[0]);
      }
      return out;
    }
    function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

    function makeQuestion(diff) {
      let a, b, op, answer, text;
      if (diff === 'easy') {
        op = Math.random() < 0.6 ? '+' : '−';
        if (op === '+') {
          a = rand(1, 12); b = rand(1, 12);
          answer = a + b;
        } else {
          a = rand(2, 20); b = rand(1, a);
          answer = a - b;
        }
      } else if (diff === 'normal') {
        op = Math.random() < 0.65 ? '×' : '÷';
        if (op === '×') {
          a = rand(2, 10); b = rand(2, 10);
          answer = a * b;
        } else {
          b = rand(2, 10);
          answer = rand(2, 10);
          a = b * answer;
        }
      } else {
        // hard — mix all
        const ops = ['+', '−', '×', '÷'];
        op = ops[Math.floor(Math.random() * ops.length)];
        if (op === '+') {
          a = rand(10, 50); b = rand(5, 50);
          answer = a + b;
        } else if (op === '−') {
          a = rand(20, 80); b = rand(5, a - 1);
          answer = a - b;
        } else if (op === '×') {
          a = rand(2, 12); b = rand(2, 12);
          answer = a * b;
        } else {
          b = rand(2, 12);
          answer = rand(2, 12);
          a = b * answer;
        }
      }
      text = `${a} ${op} ${b} = ?`;
      return { text, answer };
    }

    function makeDistractors(answer, diff) {
      // Generate 3 distinct distractors near the answer
      const pool = new Set();
      const tries = 50;
      for (let i = 0; i < tries && pool.size < 6; i++) {
        const variance = diff === 'easy' ? 4 : diff === 'normal' ? 6 : 10;
        let d = answer + (Math.floor(Math.random() * (variance * 2 + 1)) - variance);
        if (d === answer || d < 0) continue;
        pool.add(d);
      }
      return pickN(Array.from(pool), 3);
    }

    function shuffle(arr) {
      const c = arr.slice();
      for (let i = c.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [c[i], c[j]] = [c[j], c[i]];
      }
      return c;
    }

    // ---------- DOM ----------
    const stageEl = document.getElementById('stage');
    const canvas = document.getElementById('race');
    const ctx = canvas.getContext('2d');
    const qtextEl = document.getElementById('qtext');
    const ansEl = document.getElementById('answers');
    const pFillEl = document.getElementById('pFill');
    const cFillEl = document.getElementById('cFill');
    const streakEl = document.getElementById('streak');
    const curtainEl = document.getElementById('curtain');
    const curtainTitle = document.getElementById('curtainTitle');
    const curtainSub = document.getElementById('curtainSub');
    const curtainInner = document.getElementById('curtainInner');
    const startBtn = document.getElementById('startBtn');
    const diffRow = document.getElementById('diffRow');

    // ---------- Sizing ----------
    const VW = 700;
    let scale = 1;
    function resize() {
      const cssW = stageEl.clientWidth;
      const cssH = stageEl.clientHeight;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      scale = canvas.width / VW;
      draw();
    }
    window.addEventListener('resize', resize);
    function VH() { return canvas.height / scale; }

    // ---------- Game state ----------
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    let state = 'idle';   // 'idle' | 'countdown' | 'playing' | 'finished'
    let diff = 'normal';
    let q = null;
    let streak = 0;
    let correct = 0;
    let wrong = 0;
    let playerPos = 0;
    let cpuPos = 0;
    let raceStart = 0;
    let lastFrame = 0;
    let bgX = 0;
    let lockAnswers = false;
    let pendingScroll = 0; // smooth scroll bursts
    let lastBoostT = 0;

    function applyDiffButton() {
      diffRow.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.diff === diff);
      });
    }
    diffRow.addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b) return;
      diff = b.dataset.diff;
      applyDiffButton();
    });

    function newQuestion() {
      q = makeQuestion(diff);
      const opts = shuffle([q.answer, ...makeDistractors(q.answer, diff)]);
      qtextEl.textContent = q.text;
      ansEl.innerHTML = '';
      opts.forEach((v, i) => {
        const b = document.createElement('button');
        b.className = 'answer';
        b.textContent = v;
        b.dataset.value = v;
        b.addEventListener('click', () => onAnswer(b, v));
        ansEl.appendChild(b);
      });
      lockAnswers = false;
    }

    function onAnswer(btn, value) {
      if (lockAnswers || state !== 'playing') return;
      lockAnswers = true;
      const isRight = value === q.answer;
      if (isRight) {
        correct++;
        streak++;
        streakEl.textContent = streak;
        playerPos = Math.min(TRACK_LENGTH, playerPos + CORRECT_BOOST);
        pendingScroll += 30; // burst of speed for visual flair
        lastBoostT = performance.now();
        btn.classList.add('good');
        playGood();
        spawnPop('+' + Math.round(CORRECT_BOOST) + '%', 'good');
        setTimeout(advance, 280);
      } else {
        wrong++;
        streak = 0;
        streakEl.textContent = streak;
        playerPos = Math.max(0, playerPos - WRONG_PENALTY);
        btn.classList.add('bad');
        // highlight the right answer briefly
        ansEl.querySelectorAll('.answer').forEach(b => {
          if (Number(b.dataset.value) === q.answer) b.classList.add('good');
          b.disabled = true;
        });
        playBad();
        spawnPop('Oops!', 'bad');
        setTimeout(advance, 700);
      }
    }
    function advance() {
      if (state !== 'playing') return;
      newQuestion();
    }

    function spawnPop(text, kind) {
      const rect = stageEl.getBoundingClientRect();
      const p = document.createElement('div');
      p.className = 'pop ' + kind;
      p.textContent = text;
      // anchor over the player splat (left side of stage)
      p.style.left = (rect.width * 0.22) + 'px';
      p.style.top = (rect.height * 0.55) + 'px';
      stageEl.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    // Keyboard 1-4
    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (state === 'playing' && /^[1-4]$/.test(e.key)) {
        const btn = ansEl.children[Number(e.key) - 1];
        if (btn && !btn.disabled) btn.click();
      } else if ((e.key === 'Enter' || e.key === ' ')) {
        if (state === 'idle' || state === 'finished') {
          e.preventDefault();
          startGame();
        }
      }
    });

    startBtn.addEventListener('click', startGame);

    // ---------- Race flow ----------
    async function startGame() {
      ensureAudio();
      state = 'countdown';
      curtainEl.classList.add('hidden');
      playerPos = 0;
      cpuPos = 0;
      streak = 0;
      correct = 0;
      wrong = 0;
      streakEl.textContent = 0;
      // Countdown overlay
      const overlay = document.createElement('div');
      overlay.className = 'curtain';
      overlay.style.background = 'rgba(255,255,255,0.4)';
      const num = document.createElement('div');
      num.className = 'countdown';
      overlay.appendChild(num);
      stageEl.appendChild(overlay);
      for (const n of [3, 2, 1, 'GO!']) {
        num.textContent = n;
        num.style.animation = 'none';
        void num.offsetWidth;
        num.style.animation = 'count 0.9s ease-out';
        playCountdown(n === 'GO!' ? 0 : n);
        await new Promise(r => setTimeout(r, 700));
      }
      overlay.remove();
      state = 'playing';
      raceStart = performance.now();
      lastFrame = raceStart;
      newQuestion();
    }

    function finish(playerWon) {
      state = 'finished';
      if (playerWon) playWin(); else playLose();
      const elapsed = ((performance.now() - raceStart) / 1000).toFixed(1);
      const accuracy = correct + wrong > 0 ? Math.round((correct / (correct + wrong)) * 100) : 0;
      let bestMsg = '';
      if (playerWon && (best === 0 || Number(elapsed) < best)) {
        best = Number(elapsed);
        localStorage.setItem(BEST_KEY, String(best));
        bestMsg = ' New best time!';
      }
      curtainTitle.textContent = playerWon ? 'You won! 🏁' : 'Splat Bot won 🤖';
      curtainSub.innerHTML =
        `<strong>${correct}</strong> correct · <strong>${wrong}</strong> wrong · ${accuracy}% · ${elapsed}s.` +
        (best > 0 ? `<br>Best time: ${best}s.` : '') +
        (bestMsg ? `<br><em>${bestMsg}</em>` : '');
      // restore start UI
      curtainInner.querySelector('.diff-row').style.display = 'flex';
      startBtn.textContent = 'Race again';
      curtainEl.classList.remove('hidden');
    }

    // ---------- Main loop ----------
    function loop(now) {
      const dt = Math.min(0.1, (now - lastFrame) / 1000);
      lastFrame = now;

      if (state === 'playing') {
        cpuPos = Math.min(TRACK_LENGTH, cpuPos + CPU_RATES[diff] * dt);
        // smooth-decay any pending boost effect (visual only)
        pendingScroll = Math.max(0, pendingScroll - dt * 50);
        // win/lose check
        if (playerPos >= TRACK_LENGTH) finish(true);
        else if (cpuPos >= TRACK_LENGTH) finish(false);
      }

      // bg scrolls based on overall race intensity
      const intensity = state === 'playing'
        ? (CPU_RATES[diff] * 18 + pendingScroll * 0.6)
        : 8;
      bgX = (bgX + dt * intensity) % 400;

      pFillEl.style.width = playerPos + '%';
      cFillEl.style.width = cpuPos + '%';

      draw();
      requestAnimationFrame(loop);
    }

    // ---------- Drawing ----------
    function draw() {
      ctx.save();
      ctx.scale(scale, scale);

      const vH = VH();
      ctx.clearRect(0, 0, VW, vH);

      // Sky / scenery
      // far clouds
      drawClouds(vH);
      // mid hills
      drawHills(vH);
      // ground band
      const groundY = vH * 0.78;
      const grad = ctx.createLinearGradient(0, groundY, 0, vH);
      grad.addColorStop(0, '#a3e635');
      grad.addColorStop(1, '#65a30d');
      ctx.fillStyle = grad;
      ctx.fillRect(0, groundY, VW, vH - groundY);
      // dotted lane markings
      ctx.fillStyle = 'rgba(26,26,26,0.35)';
      for (let i = -bgX; i < VW; i += 36) {
        ctx.fillRect(i, vH - 14, 22, 4);
      }
      // top of ground line
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(VW, groundY);
      ctx.stroke();

      // Finish flag — appears proportionally as either runner nears the finish
      // We anchor the flag at the right side of the screen when player or CPU >= 60% progress
      const closest = Math.max(playerPos, cpuPos);
      if (closest >= 60) {
        const flagAhead = (100 - closest) / 40; // 1 → far, 0 → here
        const flagX = VW - 30 - flagAhead * 80;
        drawFlag(flagX, groundY);
      }

      // Two runners — fixed lanes, mostly stationary; their X drifts a bit by progress
      const playerLaneY = vH * 0.55;
      const cpuLaneY    = vH * 0.70;
      const playerRunX = VW * 0.18 + (playerPos / 100) * (VW * 0.55);
      const cpuRunX    = VW * 0.18 + (cpuPos    / 100) * (VW * 0.55);

      drawRunner(playerRunX, playerLaneY, '#9333ea', '#7e22ce', 'You', state === 'playing' || state === 'countdown');
      drawRunner(cpuRunX,    cpuLaneY,    '#84cc16', '#65a30d', 'Bot', state === 'playing' || state === 'countdown');

      ctx.restore();
    }

    function drawClouds(vH) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1.5;
      const cs = [
        { x: 50,  y: 38,  s: 1 },
        { x: 220, y: 60,  s: 0.7 },
        { x: 380, y: 30,  s: 0.9 },
        { x: 520, y: 70,  s: 0.6 },
        { x: 640, y: 40,  s: 0.8 },
      ];
      for (const c of cs) {
        let x = ((c.x - bgX * 0.25) % (VW + 100));
        if (x < -80) x += VW + 100;
        cloud(x, c.y, c.s);
      }
      ctx.restore();
    }
    function cloud(x, y, s) {
      ctx.beginPath();
      ctx.arc(x,        y,        14 * s, 0, Math.PI * 2);
      ctx.arc(x + 14*s, y - 5*s,  16 * s, 0, Math.PI * 2);
      ctx.arc(x + 28*s, y,        12 * s, 0, Math.PI * 2);
      ctx.arc(x + 14*s, y + 7*s,  14 * s, 0, Math.PI * 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    function drawHills(vH) {
      ctx.save();
      ctx.fillStyle = '#86efac';
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      const baseY = vH * 0.78;
      const hills = [
        { x: 60,  r: 80 },
        { x: 220, r: 60 },
        { x: 380, r: 100 },
        { x: 540, r: 70 },
        { x: 680, r: 50 },
      ];
      ctx.beginPath();
      ctx.moveTo(-50, baseY);
      for (const h of hills) {
        let cx = ((h.x - bgX * 0.5) % (VW + 200));
        if (cx < -100) cx += VW + 200;
        ctx.arc(cx, baseY, h.r, Math.PI, 0, false);
      }
      ctx.lineTo(VW + 50, baseY);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawFlag(x, groundY) {
      ctx.save();
      // pole
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x, groundY - 70, 4, 70);
      // flag
      ctx.save();
      const t = performance.now() / 200;
      const wave = Math.sin(t) * 2;
      ctx.translate(x + 4, groundY - 68);
      // checker
      const fw = 32, fh = 22;
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 3; j++) {
          ctx.fillStyle = (i + j) % 2 === 0 ? '#1a1a1a' : '#ffffff';
          ctx.fillRect(i * (fw / 4), j * (fh / 3) + wave * (i / 4), fw / 4 + 0.5, fh / 3 + 0.5);
        }
      }
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, fw, fh);
      ctx.restore();
      ctx.restore();
    }

    function drawRunner(x, y, fill, dark, label, animate) {
      ctx.save();
      // hop animation
      const tt = performance.now() / 120;
      const hop = animate ? Math.abs(Math.sin(tt)) * 8 : 2;
      const squash = animate ? (1 - Math.abs(Math.sin(tt + Math.PI/2)) * 0.12) : 1;
      const stretch = animate ? (1 + Math.abs(Math.sin(tt + Math.PI/2)) * 0.12) : 1;

      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(x, y + 18, 22, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      const cy = y - hop;
      ctx.translate(x, cy);
      ctx.scale(stretch, squash);

      // body — sloppy blob
      const r = 22;
      ctx.fillStyle = fill;
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      const points = 9;
      for (let i = 0; i < points; i++) {
        const a = (i / points) * Math.PI * 2;
        const rr = r * (0.88 + 0.12 * Math.sin(i * 1.7 + (label === 'You' ? 0 : 0.6)));
        const px = Math.cos(a) * rr;
        const py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // little legs (two stubby ovals at bottom, alternating)
      const legSwing = Math.sin(tt) * 3;
      for (const side of [-1, 1]) {
        const phase = side * legSwing;
        ctx.fillStyle = dark;
        ctx.beginPath();
        ctx.ellipse(side * 7, r * 0.7 + Math.abs(phase) * 0.3, 5, 8 - Math.abs(phase) * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // arms — small ovals at sides that swing opposite to legs
      for (const side of [-1, 1]) {
        const swing = -side * Math.sin(tt) * 4;
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.ellipse(side * (r * 0.9), -2 + swing, 5, 7, side * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // eyes
      const eyeR = 4.5;
      for (const ex of [-7, 7]) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex, -3, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(ex + 1, -2, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // mouth — smile or open
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      // smile if recent boost, else neutral
      const sinceBoost = performance.now() - lastBoostT;
      const isPlayer = label === 'You';
      if (isPlayer && sinceBoost < 600) {
        ctx.arc(0, 8, 5, 0, Math.PI * 2);
      } else {
        ctx.arc(0, 6, 6, 0.15 * Math.PI, 0.85 * Math.PI);
      }
      ctx.stroke();

      // robot antenna for the bot
      if (label === 'Bot') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-1, -r - 6, 2, 6);
        ctx.beginPath();
        ctx.arc(0, -r - 8, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ec4899';
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();

      // name label below
      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 11px "Baloo 2", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(label, x, y + 25);
    }

    // ---------- Boot ----------
    applyDiffButton();
    resize();
    requestAnimationFrame(function frame(now) { lastFrame = now; requestAnimationFrame(loop); });
  </script>
</body>
</html>
